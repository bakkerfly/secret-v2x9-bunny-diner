<!DOCTYPE html>
<html lang="ja">
    <head>
        <link rel="icon" type="image/png" href="images/other/logo_suba.png">
        <meta name="robots" content="noindex, nofollow">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>バニーダイナー 公式WEB | subadiner</title>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;500&display=swap" rel="stylesheet">
        <script src="script.js" defer></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <a id="topLink" style="cursor: pointer;">
                <img src="images/other/logo_bunnydiner.png" alt="logo">
            </a>
            <nav>
                <a href="#about">ABOUT</a>
                <a href="#character">CHARACTER</a>
                <a href="#gallery">GALLERY</a>
            </nav>
        </header>
        <section class="hero">
            <div class="hero-content">
                <div class="hero-corner-logos">
                    <img src="images/other/switch_logo.png" alt="Switch Logo">
                    <img src="images/other/steam_logo.png" alt="Steam Logo">
                </div>
                <img src="images/other/logo_bunnydiner.png" class="logo" alt="Bunny Diner Logo">
                <p class="release">2826.04.01 RELEASE</p>
            </div>
        </section>
        <div class="store-buttons">
            <a href="https://maka819.github.io/shokudo-subatch-store/" target="_blank" rel="noopener noreferrer">
                <img src="images/other/switch.png" class="store-btn" alt="Nintendo Switch Store">
            </a>
            <a href="https://store.steampowered.com/" target="_blank" rel="noopener noreferrer">
                <img src="images/other/steam.png" class="store-btn" alt="Steam Store">
            </a>
        </div>
        <section id="about" class="section reveal-on-scroll">
            <h2>ABOUT</h2>
            <p>
                「誕生日プレゼント？バニー改変でお願いします！」<br>
                その一言で始まった一夜の夢の競演<br>なんか書く

            </p>
        </section>
        <section id="character" class="section reveal-on-scroll">
            <h2>CHARACTER</h2>
            <div class="character-selector" id="selector"></div>
            <div class="character-display">
                <div class="character-image">
                    <img id="charImage" alt="Character image">
                </div>
                <div class="character-text">
                    <h3 id="charName"></h3>
                    <p id="charDesc"></p>
                </div>
            </div>
        </section>
        <section id="gallery" class="section reveal-on-scroll">
            <h2>GALLERY</h2>
            <div class="gallery">
                <img src="images/gallery/fensingu.webp" class="gallery-img" alt="Gallery image 1" loading="lazy" decoding="async">
                <img src="images/gallery/happybirthday.webp" class="gallery-img" alt="Gallery image 2" loading="lazy" decoding="async">
                <img src="images/gallery/VRChat_2026-04-18_21-09-46.516_3840x2160.webp" class="gallery-img" alt="Gallery image 3" loading="lazy" decoding="async">
                <img src="images/gallery/VRChat_2026-04-18_22-15-22.735_1440x2560.webp" class="gallery-img" alt="Gallery image 4" loading="lazy" decoding="async">

                <img src="images/gallery/VRChat_2026-04-18_22-25-43.053_1440x2560.webp" class="gallery-img" alt="Gallery image 7" loading="lazy" decoding="async">
                <img src="images/gallery/VRChat_2026-04-18_22-47-38.490_2560x1440.webp" class="gallery-img" alt="Gallery image 8" loading="lazy" decoding="async">
                <img src="images/gallery/VRChat_2026-04-18_23-24-27.384_2560x1440.webp" class="gallery-img" alt="Gallery image 9" loading="lazy" decoding="async">
                <img src="images/gallery/VRChat_2026-04-18_23-25-04.365_2560x1440.webp" class="gallery-img" alt="Gallery image 10" loading="lazy" decoding="async">

            <button class="modal-close" id="modalClose" aria-label="モーダルを閉じる">×</button>

            <img id="modalImg" alt="Expanded image">
            <span class="next">›</span>

        <footer>© BunnyDiner</footer>
